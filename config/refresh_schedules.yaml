# Refresh schedules for external benchmark sources.
# Values are days; any benchmark older than its source type's threshold is
# flagged as stale by governance.stale_benchmark_report().
#
# Derivation:
#   pillar3 / apra_adi : quarterly disclosure + 30-day grace          -> 120
#   bureau             : quarterly update + grace                     -> 120
#   rating_agency      : annual update + 30-day grace                 -> 395
#   industry_body      : semi-annual (JLL, CoreLogic, AFIA)           -> 210
#   listed_peer        : semi-annual investor reporting               -> 210
#   rba                : semi-annual stability review                 -> 210
#   regulatory (APS)   : infrequent structural updates (~2 yr)        -> 760
#   governance_pubs    : APRA Insight + CFR (monthly poll)            -> 30

refresh_schedules:
  pillar3:           120
  apra_adi:          120
  rating_agency:     395
  industry_body:     210
  listed_peer:       210
  rba:               210
  bureau:            120
  regulatory:        760
  apra_insight:      30
  cfr_publications:  30
